# Dependabot — Python (pip), npm, and GitHub Actions, weekly, with security auto-PRs.
# ADDITIVE. Doctrine v11 LOCKED 749/14/163 locked_at c7c0ba17
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
