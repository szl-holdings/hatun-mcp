name: sbom

# SBOM generation via Syft. Runs on PR + nightly; uploads SBOM artifact;
# commits SBOM to attestations branch on schedule.
# ADDITIVE. Doctrine v11 LOCKED 749/14/163 locked_at c7c0ba17
#
# CI-fix 2026-06-09: the anchore/sbom-action@v0 "install syft" step fails
# intermittently ("failed to install syft" — upstream installer/download flake).
# Replaced with a pinned Syft binary installed via the official install script
# inside a retry loop, then syft invoked directly. Pin + retry removes the flake.

on:
  pull_request:
  schedule:
    - cron: '23 2 * * *'   # nightly 02:23 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sbom:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Syft (pinned, with retry)
        env:
          SYFT_VERSION: v1.45.1
        run: |
          set -euo pipefail
          ok=""
          for i in 1 2 3 4 5; do
            if curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
                 | sh -s -- -b /usr/local/bin "${SYFT_VERSION}"; then
              ok="1"; break
            fi
            echo "syft install attempt ${i} failed; retrying in $((i*5))s"
            sleep $((i*5))
          done
          if [ -z "${ok}" ]; then
            echo "::error::failed to install syft ${SYFT_VERSION} after 5 attempts"
            exit 1
          fi
          syft version

      - name: Generate SBOM (SPDX JSON)
        run: syft dir:. -o spdx-json=SBOM.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sbom-spdx-json
          path: SBOM.spdx.json

      - name: Commit SBOM to attestations branch (nightly only)
        if: github.event_name == 'schedule'
        run: |
          set -e
          git config user.name "Yachay"
          git config user.email "yachay@szlholdings.dev"
          git fetch origin attestations || true
          git checkout attestations 2>/dev/null || git checkout --orphan attestations
          git rm -rf . >/dev/null 2>&1 || true
          git checkout ${{ github.sha }} -- SBOM.spdx.json 2>/dev/null || true
          cp -f $GITHUB_WORKSPACE/SBOM.spdx.json . 2>/dev/null || true
          git add SBOM.spdx.json || true
          git commit -m "chore(sbom): nightly SBOM $(date -u +%F)" || echo "no changes"
          git push origin attestations || echo "push skipped"
