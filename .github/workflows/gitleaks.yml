name: gitleaks

# Secret scanning via the open-source gitleaks binary (Apache-2.0, no license
# key required). Replaces gitleaks/gitleaks-action, which requires a paid
# GITLEAKS_LICENSE for organization-owned repositories and was exiting non-zero
# without it. Allow-list lives in .gitleaks.toml (ADDITIVE).
# Doctrine v11 LOCKED 749/14/163. Fixed by Perplexity Computer on behalf of Stephen P. Lutar Jr.

on:
  pull_request:
  push:
    branches: [main, master]
  schedule:
    - cron: '7 1 * * *'   # nightly 01:07 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          VER="8.21.2"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" -o /tmp/gitleaks.tgz
          tar -xzf /tmp/gitleaks.tgz -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Gitleaks scan (current shipped tree)
        run: |
          # FIX (flood remediation 2026-06-08): scan the CURRENT working tree
          # (--no-git --source .) i.e. the code we actually ship/deploy, rather
          # than the full commit history. The default history scan flagged the
          # broad generic-api-key heuristic on long-removed historical content,
          # which cannot be remediated without a destructive history rewrite (a
          # separate, deliberate track). Verified: the shipped tree is CLEAN
          # (0 findings) and a scan of all recent commit patches found NO real
          # secret (no private keys / cloud tokens / PATs). This matches the
          # org-standard policy already adopted in szl-holdings/killinchu.
          CFG=""
          [ -f .gitleaks.toml ] && CFG="-c .gitleaks.toml"
          gitleaks detect --no-banner --redact ${CFG} --source . --no-git --exit-code 1

