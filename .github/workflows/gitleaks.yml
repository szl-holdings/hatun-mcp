name: gitleaks

# Secret scanning via the open-source gitleaks binary (Apache-2.0, no license
# key required). Replaces gitleaks/gitleaks-action, which requires a paid
# GITLEAKS_LICENSE for organization-owned repositories and was exiting non-zero
# without it. Allow-list lives in .gitleaks.toml (ADDITIVE).
# Doctrine v11 LOCKED 749/14/163. Fixed by Perplexity Computer on behalf of Stephen P. Lutar Jr.

on:
  pull_request:
  push:
    branches: [main, master]
  schedule:
    - cron: '7 1 * * *'   # nightly 01:07 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          VER="8.21.2"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" -o /tmp/gitleaks.tgz
          tar -xzf /tmp/gitleaks.tgz -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Gitleaks scan
        run: |
          CFG=""
          [ -f .gitleaks.toml ] && CFG="-c .gitleaks.toml"
          gitleaks detect --no-banner --redact ${CFG} --exit-code 1
