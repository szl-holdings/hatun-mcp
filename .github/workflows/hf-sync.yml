name: Sync to HuggingFace Space

# Mirrors this repo to the live Hugging Face Space (SZLHOLDINGS/hatun-mcp).
# Until now the Space was pushed only by the manual local push_to_hf.py
# (founder-token, local folder), so the live Space lagged main
# (e.g. #38 security headers / #37 wiring).
#
# This is the CI replacement for push_to_hf.py: it uploads the repo (which IS the
# Space source — it carries its own Dockerfile) via huggingface_hub.upload_folder,
# excluding VCS/CI/secret/cache files and the local-only push_to_hf.py. It reads
# the token from the HF_TOKEN secret (never a filesystem path) and fails loudly if
# the secret is absent rather than faking a sync.
#
# Requires repo secret HF_TOKEN (HF write token with org write to SZLHOLDINGS).
#
# TRIGGER: workflow_dispatch only (not on push).
# Reason: GitHub Actions does not permit the 'secrets' context in a job-level
# 'if' condition, so we cannot skip the job on push when the secret is absent.
# The repo has no HF_TOKEN secret; running on push would fail every commit.
# workflow_dispatch means this job only fires when a human explicitly runs it
# from the Actions UI — i.e. exactly when the founder has the token and intends
# to sync. Re-add 'push: branches: [main]' once HF_TOKEN is provisioned.
#
# FOUNDER ACTION REQUIRED: add repository secret HF_TOKEN (HF write token,
# org write access to SZLHOLDINGS), then restore the push trigger by adding:
#   on:
#     push:
#       branches: [main]
#     workflow_dispatch: {}

on:
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: hf-sync-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - name: Install huggingface_hub
        run: pip install --quiet "huggingface_hub>=0.25"
      - name: Mirror repo to the Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          SPACE_ID: SZLHOLDINGS/hatun-mcp
        run: |
          set -euo pipefail
          if [ -z "${HF_TOKEN:-}" ]; then
            echo "::error::HF_TOKEN secret is not set — cannot sync the Space."
            echo "::error::Founder action required: add repo secret HF_TOKEN (HF write token, org write to SZLHOLDINGS)."
            exit 1
          fi
          python3 <<'PYEOF'
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          space = os.environ["SPACE_ID"]
          commit = api.upload_folder(
              repo_id=space, repo_type="space", folder_path=".",
              commit_message=f"hf-sync: mirror repo from GitHub {os.environ.get('GITHUB_SHA','')[:8]}",
              ignore_patterns=[
                  ".git", ".git/*", "**/.git/**",
                  ".github", ".github/**",
                  "**/__pycache__/**", "*.pyc", ".pytest_cache/*",
                  # Exclude ONLY private keys; PUBKEY_*.pem is served by /pubkey
                  # and must reach the Space.
                  ".keys_DO_NOT_COMMIT.pem", ".secret/*", ".env", "*.log",
                  "push_to_hf.py",
              ],
          )
          print("Space commit:", getattr(commit, "commit_url", commit))
          info = api.space_info(space)
          print("Space sha:", info.sha, "runtime:",
                getattr(getattr(info, "runtime", None), "stage", None))
          PYEOF
