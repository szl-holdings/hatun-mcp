name: ci

# Hatun-MCP CI — run the test suite, build the container, push to GHCR on main.
# SLSA L1 honest + L2 attested (actions/attest-build-provenance on the pushed image).
# Doctrine v11 LOCKED 749/14/163 · receipts.in ≡ receipts.out
#
# Hermetic tests: HATUN_MCP_DISABLE_DYNAMIC=true so the suite never depends on a
# live organ Space (adapters are exercised against mocked endpoints in test_adapters).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  test:
    name: pytest (server · quorum · adapters · governance)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run test suite (hermetic)
        env:
          HATUN_MCP_DISABLE_DYNAMIC: "true"
          HATUN_MCP_BACKEND_TIMEOUT: "1.0"
        run: |
          python -m pytest tests/test_server.py tests/test_quorum.py \
            tests/test_adapters.py tests/test_governance.py \
            tests/test_http_routes.py -q

  container-contract:
    name: build and exercise pinned Space image
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build pinned Space image
        run: docker build --tag hatun-mcp-space-ci .
      - name: Start Space image
        run: docker run --detach --name hatun-mcp-space-ci --publish 7860:7860 --env HATUN_MCP_DISABLE_DYNAMIC=true hatun-mcp-space-ci
      - name: Verify live container contract
        run: |
          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error http://127.0.0.1:7860/healthz > health.json; then
              python -c "import json; data=json.load(open('health.json', encoding='utf-8')); assert data['status']=='ok'; assert data['service']=='hatun-mcp'; assert isinstance(data['chain_verified'], bool); assert data['protocol_revision']"
              test "$(curl --silent --output /dev/null --write-out '%{http_code}' http://127.0.0.1:7860/this-route-must-not-exist)" = "404"
              exit 0
            fi
            sleep 1
          done
          docker logs hatun-mcp-space-ci
          exit 1
      - name: Stop Space image
        if: always()
        run: docker rm --force hatun-mcp-space-ci || true

  build-and-push:
    name: build container + push to GHCR (main only) + SLSA L2 attest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write          # for build-provenance attestation (SLSA L2)
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build and push
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          provenance: true       # SLSA provenance attached by buildkit

      - name: Attest build provenance (SLSA L2)
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

