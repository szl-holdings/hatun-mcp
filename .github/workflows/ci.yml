name: ci

# Hatun-MCP CI — run the test suite, build the container, push to GHCR on main.
# SLSA L1 honest + L2 attested (actions/attest-build-provenance on the pushed image).
# Doctrine v11 LOCKED 749/14/163 · receipts.in ≡ receipts.out
#
# Hermetic tests: HATUN_MCP_DISABLE_DYNAMIC=true so the suite never depends on a
# live organ Space (adapters are exercised against mocked endpoints in test_adapters).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  test:
    name: pytest (server · quorum · adapters · governance)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run test suite (hermetic)
        env:
          HATUN_MCP_DISABLE_DYNAMIC: "true"
          HATUN_MCP_BACKEND_TIMEOUT: "1.0"
        run: |
          python -m pytest tests/test_server.py tests/test_quorum.py \
            tests/test_adapters.py tests/test_governance.py -q

  build-and-push:
    name: build container + push to GHCR (main only) + SLSA L2 attest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write          # for build-provenance attestation (SLSA L2)
      attestations: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          provenance: true       # SLSA provenance attached by buildkit

      - name: Attest build provenance (SLSA L2)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

