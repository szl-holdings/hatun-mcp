name: codeql

# Hatun-MCP CodeQL SAST — analyze Python + Actions on push/PR to main and weekly.
# This is the authoritative recurring SAST gate for the repo: it refreshes the
# Code Scanning results on every push to main so fixed findings auto-close and
# new ones surface. Least-privilege: read by default; security-events: write only
# on the analyze job so CodeQL can upload SARIF.
#
# Doctrine v11 LOCKED — 749 / 14 / 163 · Λ = Conjecture 1 · SLSA L1 honest + L2 attested

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    name: analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # upload CodeQL SARIF to code-scanning
    strategy:
      fail-fast: false
      matrix:
        language: [python, actions]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          category: "/language:${{ matrix.language }}"

