# Gitleaks config for SZL Holdings. Extends defaults; allow-lists known false positives.
# Doctrine v11 LOCKED 749/14/163 locked_at c7c0ba17
title = "SZL Gitleaks Config"

[extend]
useDefault = true

[allowlist]
description = "SZL known false-positives"
# cosign / sigstore PUBLIC keys are safe to commit (public verification material).
regexes = [
  '''-----BEGIN PUBLIC KEY-----[\s\S]*?-----END PUBLIC KEY-----''',
]
paths = [
  '''cosign\.pub''',
  '''.*\.pub$''',
  '''.*cosign.*\.pem$''',
]

# --- ADDITIVE allowlist: cosign key-ID label false positive ---
# governance.py:127 references the cosign key identifier "szlholdings-ec-p256",
# a public key *label* (not a secret). gitleaks generic-api-key flags it.
# Fixed by Perplexity Computer on behalf of Stephen P. Lutar Jr.
[[allowlist.regexes]]
regex = '''szlholdings-ec-p256'''
